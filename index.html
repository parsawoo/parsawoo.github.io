<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parsawoo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Iso&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='30' r='18' fill='%23FF8A00'/%3E%3Ccircle cx='30' cy='65' r='18' fill='%23FF8A00'/%3E%3Ccircle cx='70' cy='65' r='18' fill='%23FF8A00'/%3E%3C/svg%3E">
  <script src="data.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #080808; cursor: none; }

    #glcanvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }
    #cursor { position: fixed; width: 12px; height: 12px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 999; mix-blend-mode: difference; }

    #header {
      position: fixed; top: 2.5rem; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
      z-index: 3; opacity: 0; animation: fadeIn .8s .3s forwards; text-align: center; width: 100%;
    }
    /* ── 상단 텍스트 애니메이션 추가 ── */
    #datetime, #credit {
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8), 0 2px 4px rgba(0,0,0,0.9), 0 4px 8px rgba(0,0,0,1);
      white-space: nowrap;
      font-family: 'Archivo', sans-serif;
      
      /* 마우스 반응을 위한 설정 */
      display: inline-block;
      transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); /* 쫀득하게 돌아오는 느낌 */
      pointer-events: none; /* 글자가 마우스 이벤트를 가리지 않게 함 */
    }
    #datetime { font-size: 14px; font-weight: 700; letter-spacing: -0.02em; }
    #credit { font-size: 11px; font-weight: 500; letter-spacing: -0.01em; opacity: 0.6; }

    #footer {
      position: fixed; bottom: 4rem; left: 0; right: 0;
      display: flex; flex-direction: column; align-items: center; gap: 1.5rem;
      z-index: 3; opacity: 0; animation: fadeIn .8s .6s forwards;
    }
    .btn { text-decoration: none; cursor: none; transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); width: 100%; text-align: center; }
    .btn span {
      display: inline-block; font-family: 'Rubik Iso', system-ui; font-size: 8.5vw;
      letter-spacing: -0.06em; color: #fff; white-space: nowrap;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8), 0 4px 8px rgba(0,0,0,0.9), 0 8px 16px rgba(0,0,0,1);
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @media (min-width: 768px) {
      #datetime { font-size: 21px; }
      #credit { font-size: 16px; }
      #header { gap: 0.5rem; }
      #footer { gap: 3rem; bottom: 6rem; }
      .btn span { font-size: 52px; }
    }

    .btn-primary { transform: rotate(-4deg); }
    .btn-primary:hover span { opacity: 0.6; transform: scale(1.1) rotate(-6deg); filter: blur(12px) brightness(2.5); text-shadow: 0 0 25px #fff; }
    .btn-secondary { transform: rotate(5deg); }
    .btn-secondary:hover span { opacity: 0.5; transform: scale(1.1) rotate(8deg); filter: blur(10px) brightness(0); text-shadow: none; }
    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</head>
<body>
<canvas id="glcanvas"></canvas>
<div id="cursor"></div>
<div id="header">
  <div id="datetime"></div>
  <div id="credit">Curated by Parsawoo</div>
</div>
<div id="footer">
  <a class="btn btn-primary" href="weekly.html"><span>Weekly Letter</span></a>
  <a class="btn btn-secondary" href="hourly.html"><span>Fortune Cookies</span></a>
</div>

<script>
  let mx = window.innerWidth / 2, my = window.innerHeight / 2;
  let smx = mx, smy = my;
  const cursorEl = document.getElementById('cursor');
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; cursorEl.style.left = mx + 'px'; cursorEl.style.top = my + 'px'; });

  const dtEl = document.getElementById('datetime');
  function updateTime() {
    const now = new Date();
    dtEl.textContent = now.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }) + ' — ' + now.toLocaleTimeString('en-US', { hour12:false });
  }
  setInterval(updateTime, 1000); updateTime();

  const canvas = document.getElementById('glcanvas');
  const gl = canvas.getContext('webgl');

  const vsSource = `attribute vec2 a_pos; varying vec2 v_uv; void main() { v_uv = a_pos * 0.5 + 0.5; gl_Position = vec4(a_pos, 0.0, 1.0); }`;
  const fsSource = `
    precision mediump float;
    uniform sampler2D u_tex;
    uniform vec2 u_res;
    uniform vec2 u_imgRes;
    uniform vec2 u_mouse;
    uniform float u_time;
    varying vec2 v_uv;
    void main() {
      vec2 s = u_res; vec2 i = u_imgRes;
      float rs = s.x / s.y; float ri = i.x / i.y;
      vec2 newUv = rs < ri ? vec2(i.x * s.y / i.y, s.y) : vec2(s.x, i.y * s.x / i.x);
      vec2 offset = (newUv - s) / 2.0 / newUv;
      vec2 uv = v_uv * (s / newUv) + offset;
      uv.y = 1.0 - uv.y;
      float dist = distance(v_uv, vec2(u_mouse.x/u_res.x, 1.0 - u_mouse.y/u_res.y));
      float ripple = sin(dist * 25.0 - u_time * 5.0) * exp(-dist * 6.0) * 0.015;
      vec2 dir = normalize(v_uv - vec2(u_mouse.x/u_res.x, 1.0 - u_mouse.y/u_res.y) + 0.0001);
      uv += dir * ripple;
      vec4 col = texture2D(u_tex, uv);
      gl_FragColor = vec4(col.rgb + vec3(abs(ripple) * 10.0 * exp(-dist * 8.0)), col.a);
    }
  `;

  function createShader(gl, type, src) {
    const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s); return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, createShader(gl, gl.VERTEX_SHADER, vsSource));
  gl.attachShader(prog, createShader(gl, gl.FRAGMENT_SHADER, fsSource));
  gl.linkProgram(prog); gl.useProgram(prog);

  const vertices = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
  gl.bindBuffer(gl.ARRAY_BUFFER, gl.createBuffer());
  gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  const uRes = gl.getUniformLocation(prog, 'u_res');
  const uImgRes = gl.getUniformLocation(prog, 'u_imgRes');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');
  const uTime = gl.getUniformLocation(prog, 'u_time');
  let imgRes = [1, 1];

  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([10,10,10,255]));

  function loadBg() {
    if (typeof IMAGES === 'undefined' || !IMAGES.length) return;
    const img = new Image(); img.crossOrigin = "anonymous";
    img.onload = () => {
      imgRes = [img.width, img.height];
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    };
    img.src = IMAGES[Math.floor(Math.random() * IMAGES.length)];
  }
  loadBg();

 /* ── 상단 텍스트 "확!" 도망가기 효과 ── */
  const headerItems = [dtEl, document.getElementById('credit')];
  
  function updateHeaderRepulsion() {
    headerItems.forEach(item => {
      const rect = item.getBoundingClientRect();
      const itemX = rect.left + rect.width / 2;
      const itemY = rect.top + rect.height / 2;
      
      const dx = mx - itemX;
      const dy = my - itemY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      const radius = 250; // 더 넓은 범위에서 감지
      if (dist < radius) {
        // 거리가 가까울수록 기하급수적으로 힘이 강해짐
        let force = (radius - dist) / radius;
        force = Math.pow(force, 1.5); // 가속도 추가
        
        // 최대 120px까지 확! 밀려나게 설정
        const moveX = -(dx * force * 120) / dist;
        const moveY = -(dy * force * 80) / dist;
        
        item.style.transform = `translate(${moveX}px, ${moveY}px) scale(${1 - force * 0.2})`;
      } else {
        item.style.transform = `translate(0px, 0px) scale(1)`;
      }
    });
  }

  function render(t) {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    gl.viewport(0, 0, canvas.width, canvas.height);
    smx += (mx - smx) * 0.1; smy += (my - smy) * 0.1;
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform2f(uImgRes, imgRes[0], imgRes[1]);
    gl.uniform2f(uMouse, smx, smy);
    gl.uniform1f(uTime, t * 0.001);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    // ── 실시간 반발력 업데이트 ──
    updateHeaderRepulsion();

    requestAnimationFrame(render);
  }
  requestAnimationFrame(render);
</script>
</body>
</html>
